<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write a Feedback</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
  @keyframes auroraBackground {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: auroraBackground 18s ease infinite;
    margin: 0;
    color: #1e293b;
    display: flex;
    flex-direction: column;  /* changed */
    min-height: 100vh;       /* ensures footer stays at bottom */
  }
  main {
    flex: 1;                 /* makes container take remaining height */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .container {
    max-width: 600px;
    width: 100%;
    padding: 2.5rem;
    text-align: center;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.18);
  }
  h1 { color: #1a237e; font-size: 2.5rem; margin-bottom: 2rem; }
  form { text-align: left; }
  form label { font-weight: bold; margin-bottom: 0.5rem; display: block; }
  form input, form textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 0.75rem;
    margin-bottom: 1rem;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  form button {
    margin-top: 1rem;
    width: 100%;
    background-color: #1a237e;
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background-color 0.3s;
  }
  form button:hover { background-color: #0d47a1; }
  form button:disabled { background-color: #aaa; cursor: not-allowed; }
  #statusMessage {
    text-align: center;
    margin-top: 1.5rem;
    font-weight: bold;
    font-size: 1.1rem;
  }
  .home-link {
    display: block;
    text-align: center;
    margin-top: 2rem;
    color: #00796b;
    text-decoration: none;
    font-weight: bold;
    transition: transform 0.2s;
  }
  .home-link:hover { transform: scale(1.05); }

  .footer {
    text-align: center;
    color: #333;
    font-size: 0.9rem;
    padding: 1.5rem 0;
  }
</style>
</head>

<body>
  <main>
    <div class="container">
      <h1>✍️ Share Your Feedback</h1>
      <form id="feedbackForm">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="location">Your Location (Optional):</label>
        <input type="text" id="location" name="location" placeholder="e.g., City, Country" />

        <div style="display: none;">
          <label for="address">Please leave this field empty:</label>
          <input type="text" id="address" name="address" tabindex="-1" autocomplete="off" />
        </div>

        <label for="message">Your Feedback:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" id="submitBtn">
          <i class="fas fa-paper-plane"></i> <span>Submit Feedback</span>
        </button>
      </form>

      <div id="statusMessage"></div>
      <a href="index.html" class="home-link">← Back to Home</a>
    </div>
  </main>

  <p class="footer">© 2026 Academic Support. All rights reserved.</p>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCVAeBUz2jVoOfGyxkjNnhuUbueY9UXX2NTi4df_NNnk7cqb0QaSyhzOToIvstUhrF/exec";
    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessage = document.getElementById('statusMessage');
    const locationInput = document.getElementById('location');

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        try {
          const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
          const data = await response.json();
          if (data && data.address) {
            let locationString = "";
            if (data.address.city) locationString += data.address.city;
            else if (data.address.town) locationString += data.address.town;
            else if (data.address.village) locationString += data.address.village;
            if (data.address.country) {
              if (locationString) locationString += ", ";
              locationString += data.address.country;
            }
            locationInput.value = locationString;
          }
        } catch (error) {
          console.error("Error fetching location details:", error);
        }
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (form.address.value) return;

      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = 'Submitting...';
      statusMessage.textContent = '';

      const formData = new FormData(form);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          statusMessage.textContent = "✅ Success! Thank you for your feedback.";
          statusMessage.style.color = 'green';
          form.reset();
          setTimeout(() => {
            window.location.href = "index.html";
          }, 3000);
        } else {
          throw new Error(result.error || "Unknown error");
        }

      } catch (error) {
        statusMessage.textContent = "❌ An error occurred. Please try again.";
        statusMessage.style.color = 'red';
        console.error("Submission error:", error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = 'Submit Feedback';
      }
    });
  </script>
</body>
</html>
