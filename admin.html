<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        @keyframes auroraBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: auroraBackground 18s ease infinite;
            margin: 0;
            padding: 1.5rem;
            display: flex; /* Changed to flex to control layout */
            flex-direction: column; /* Stack children vertically */
            align-items: center; /* Center horizontally */
            justify-content: space-between; /* Pushes footer to bottom */
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.18);
            margin-bottom: 2rem; /* Add some space above the footer */
        }
        h1 {
            color: #1a237e;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 0.5rem;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #e2e8f0; }
        th { background-color: rgba(248, 250, 252, 0.7); color: #475569; }
        .delete-btn { background-color: #ef4444; color: white; border: none; padding: 0.5rem 0.75rem; border-radius: 5px; cursor: pointer; }
        .delete-btn:hover { background-color: #dc2626; }
        .hidden { display: none; }
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .refresh-btn {
            background-color: #1a237e;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
        .refresh-btn:hover { background-color: #0d47a1; }
        .home-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: #00796b;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .home-link:hover { transform: scale(1.05); }
        #login-form input {
            width: 100%;
            box-sizing: border-box;
            padding: 0.75rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #login-form button {
            margin-top: 1rem;
            background-color: #1a237e;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #login-form button:hover {
            background-color: #0d47a1;
        }
        /* Footer specific styles */
        .footer {
            text-align: center;
            margin-top: auto; /* Pushes the footer to the bottom */
            color: rgba(255, 255, 255, 0.9); /* Lighter color for readability on animated background */
            font-size: 0.9rem;
            padding: 1rem 0; /* Add some padding */
        }
    </style>
</head>
<body>
    <div class="container" id="admin-container">
        <div id="login-view">
            <h1>Admin Login</h1>
            <p>Enter the password to manage testimonies.</p>
            <form id="login-form">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="controls">
                <h1>Manage Testimonies</h1>
                <button class="refresh-btn" id="refresh-btn">Refresh</button>
            </div>
            <p><span id="testimony-count">0</span> testimonies loaded.</p>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Message</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-list"></tbody>
            </table>
            <a href="index.html" class="home-link">← Back to Home</a>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "E1n2y3t4*net";
        // Ensure this SCRIPT_URL is the ONE FOR YOUR GOOGLE APPS SCRIPT
        // that contains both doPost and doGet
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzpzF9coA8QL10Gd6PUUmJ9wgZpUe87AQcFhhJPlHVMR9LLteLxCZa4mbONeFJsvan/exec";

        const loginForm = document.getElementById('login-form');
        const loginView = document.getElementById('login-view');
        const adminPanel = document.getElementById('admin-panel');
        const adminList = document.getElementById('admin-list');
        const refreshBtn = document.getElementById('refresh-btn');
        const testimonyCount = document.getElementById('testimony-count');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                loginView.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                loadAdminData();
            } else {
                alert('Incorrect password!');
            }
        });

        refreshBtn.addEventListener('click', loadAdminData);

        async function loadAdminData() {
            adminList.innerHTML = '<tr><td colspan="3">Loading...</td></tr>';
            try {
                const response = await fetch(SCRIPT_URL); // GET request
                const result = await response.json();

                if (result.success) {
                    // Sorting by rowIndex to ensure deletion order is predictable, then reverse for display
                    result.data.sort((a, b) => a.rowIndex - b.rowIndex); // Sort ascending by row index
                    populateTable(result.data.reverse()); // Reverse for display (latest first)
                } else {
                    adminList.innerHTML = `<tr><td colspan="3">Error: ${result.error}</td></tr>`;
                }
            } catch (error) {
                adminList.innerHTML = `<tr><td colspan="3">Fetch Error: ${error}</td></tr>`;
            }
        }

        function populateTable(data) {
            adminList.innerHTML = '';
            testimonyCount.textContent = data.length;
            if (data.length === 0) {
                adminList.innerHTML = '<tr><td colspan="3">No testimonies found.</td></tr>';
                return;
            }

            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.Name}</td>
                    <td>${item.Message}</td>
                    <td><button class="delete-btn" data-rowindex="${item.rowIndex}">Delete</button></td>
                `;
                adminList.appendChild(row);
            });

            document.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', handleDelete);
            });
        }

        async function handleDelete(event) {
            const button = event.target;
            const rowIndex = button.getAttribute('data-rowindex');

            if (!confirm(`Are you sure you want to delete row ${rowIndex} permanently? This cannot be undone.`)) {
                return;
            }

            button.textContent = 'Deleting...';
            button.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    // --- MODIFICATION: Include action in the body ---
                    body: JSON.stringify({ action: 'delete', rowIndex: rowIndex }),
                    headers: { 'Content-Type': 'application/json' },
                });
                const result = await response.json();

                if (result.success) {
                    button.closest('tr').remove();
                    testimonyCount.textContent = parseInt(testimonyCount.textContent) - 1;
                    // Optional: Re-load data to get correct row indices for remaining items
                    // loadAdminData();
                } else {
                    throw new Error(result.error);
                }

            } catch (error) {
                alert('Failed to delete row: ' + error.message);
                button.textContent = 'Delete';
                button.disabled = false;
            }
        }
    </script>
    <p class="footer">© 2026 Academic Support. All rights reserved.</p>
</body>
</html>
